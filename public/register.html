<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TerrA Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/showcase.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .auth-left {
            flex: 1.1;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #071324; /* Dark navy base */
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-left img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .auth-right {
            flex: 0.9;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            padding: 60px 50px;
            overflow-y: auto;
        }

        .auth-box {
            width: 100%;
            max-width: 420px;
        }

        .auth-box h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 6px;
        }

        .auth-box-sub {
            color: #64748b;
            font-size: 0.875rem;
            margin-bottom: 36px;
        }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            color: #0f172a;
            background: #f8fafc;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #054279;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(5, 66, 121, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #054279, #0a569d);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 8px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(5, 66, 121, 0.4);
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: #94a3b8;
            font-size: 0.75rem;
        }

        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .auth-footer-link {
            text-align: center;
            font-size: 0.875rem;
            color: #64748b;
        }

        .auth-footer-link a {
            color: #054279;
            font-weight: 600;
            text-decoration: none;
        }

        .auth-footer-link a:hover { text-decoration: underline; }

        .info-box {
            background: linear-gradient(135deg, #f0f4f8, #f8fafc);
            border: 1px solid #cbe0f5;
            border-radius: 10px;
            padding: 14px 16px;
            margin-top: 24px;
            font-size: 0.8rem;
            color: #054279;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .auth-left { display: none; }
            .auth-right { flex: 1; padding: 40px 24px; }
        }
    </style>
</head>

<body>
    <!-- Left: Product Hero Image -->
    <div class="auth-left">
        <img src="assets/terra_product_hero.png" alt="TerrA Platform Features">
    </div>

    <!-- Right: Register Card -->
    <div class="auth-right">
        <div class="auth-box">
            <h2>Create account</h2>
            <p class="auth-box-sub">Join the TerrA Support Portal</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">Email</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your email" autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Create a password" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-register">Create Account →</button>
            </form>

            <div class="auth-divider">or</div>

            <p class="auth-footer-link">
                Already have an account? <a href="index.html">Sign in</a>
            </p>

            <!-- <div class="info-box">
                🔐 Your account gives you access to the TerrA Support Portal to submit and track defect requests.
            </div> -->
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => handleAuth(e, 'register'));
    </script>
</body>

</html>
